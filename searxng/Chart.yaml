apiVersion: v2
name: searxng
description: A privacy-respecting, hackable metasearch engine that aggregates results from various search services without tracking users.
type: application
version: 0.1.8
appVersion: "2026.4.3-53141be38"
keywords:
  - searxng
  - search
  - metasearch
  - privacy
home: https://github.com/searxng/searxng
sources:
  - https://github.com/searxng/searxng
maintainers:
  - name: UnknownIQ
icon: https://raw.githubusercontent.com/searxng/searxng/master/client/simple/src/brand/searxng.svg
annotations:
  artifacthub.io/changes: |
    - kind: fixed
      description: Add enableServiceLinks=false to prevent granian port conflict with Kubernetes service env vars
    - kind: fixed
      description: Add fix-permissions initContainer to ensure /etc/searxng is owned by searxng:searxng
dependencies:
  - name: valkey
    version: "0.9.3"
    repository: https://valkey-io.github.io/valkey-helm/
    condition: valkey.enabled
