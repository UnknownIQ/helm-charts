name: Release Charts

on:
  push:
    branches:
      - main
    paths:
      - '*/Chart.yaml'
      - '*/values.yaml'
      - '*/templates/**'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checks-out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Add Helm repositories
        run: |
          helm repo add valkey https://valkey-io.github.io/valkey-helm/
          helm repo update

      - name: Prepare GPG keyring and passphrase
        run: |
          echo "${{ secrets.GPG_KEYRING_BASE64 }}" | base64 -d > /tmp/keyring.gpg
          echo "${{ secrets.GPG_PASSPHRASE }}" > /tmp/passphrase.txt

      - name: Package and sign charts
        run: |
          mkdir -p .cr-release-packages
          for chart_dir in */; do
            chart="${chart_dir%/}"
            if [ -f "${chart}/Chart.yaml" ]; then
              helm dependency update "./${chart}" || true
              helm package "./${chart}" \
                --sign \
                --key "${{ secrets.GPG_KEY_NAME }}" \
                --keyring /tmp/keyring.gpg \
                --passphrase-file /tmp/passphrase.txt \
                --destination .cr-release-packages
            fi
          done

      - name: Clean up GPG secrets
        if: always()
        run: rm -f /tmp/keyring.gpg /tmp/passphrase.txt

      - name: Run chart-releaser
        continue-on-error: true
        uses: helm/chart-releaser-action@v1
        with:
          charts_dir: .
          skip_existing: true
          skip_packaging: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Ensure .nojekyll on gh-pages
        run: |
          git fetch origin gh-pages
          git checkout gh-pages
          if [ ! -f .nojekyll ]; then
            touch .nojekyll
            git add .nojekyll
            git commit -m "ci: ensure .nojekyll to disable Jekyll on gh-pages"
            git push origin gh-pages
          fi
          git checkout main
